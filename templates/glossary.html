<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Glossary — all {{count}} tools · {{sitename}}</title>
<meta name="description" content="Complete index of all {{count}} free tools on {{sitename}}, each available in {{langCount}} languages.">
<link rel="canonical" href="{{canonical}}">
<meta name="robots" content="index,follow">
<style>{{{css}}}</style>
</head>
<body>
<header class="site-head"><a class="brand" href="/en/">{{sitename}}</a></header>
<main class="glossary-main">
  <h1>All tools ({{count}})</h1>
  <p class="lead">Every tool below is free, works offline in your browser, and is available in {{langCount}} languages.</p>
  <table class="glossary">
    <thead><tr><th>Tool</th><th>Category</th><th>Languages</th></tr></thead>
    <tbody>
    {{{rows}}}
    </tbody>
  </table>
</main>
<footer class="site-foot"><p>{{sitename}}</p></footer>
</body>
</html>
