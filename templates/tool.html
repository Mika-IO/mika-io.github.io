<!DOCTYPE html>
<html lang="{{lang}}" dir="{{dir}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{title}}</title>
<meta name="description" content="{{metaDescription}}">
<link rel="canonical" href="{{canonical}}">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
{{{hreflangs}}}
<meta property="og:type" content="website">
<meta property="og:title" content="{{title}}">
<meta property="og:description" content="{{metaDescription}}">
<meta property="og:url" content="{{canonical}}">
<meta property="og:locale" content="{{lang}}">
<meta name="twitter:card" content="summary">
<meta name="robots" content="index,follow,max-image-preview:large">
<style>{{{css}}}</style>
{{{jsonld}}}
</head>
<body>
<header class="site-head">{{{header}}}</header>
<main class="tool-main">
  <nav class="crumbs" aria-label="Breadcrumb"><a href="{{homeUrl}}">{{breadcrumbHome}}</a> › <span>{{h1}}</span></nav>
  <h1>{{h1}}</h1>
  <p class="lead">{{intro}}</p>
  <section class="widget" id="tool">{{{widget}}}</section>
  <article class="content">
    {{{bodyHtml}}}
    {{{faqHtml}}}
  </article>
  <nav class="lang-foot" aria-label="Languages">{{{langSwitcher}}}</nav>
</main>
<footer class="site-foot">{{{footer}}}</footer>
<script src="/assets/tool-runtime.js" defer></script>
{{{scriptTag}}}
</body>
</html>
